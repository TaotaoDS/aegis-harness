# =============================================================================
# Model Configuration — AegisHarness
# =============================================================================
# This file defines all available models and routing rules.
# API keys are NEVER stored here — only environment variable names from .env
# are referenced.
#
# Optional fields:
#   temperature   — sampling temperature (default 0.7)
#   base_url_env  — env var name for a custom API endpoint (used for
#                   third-party models that expose an OpenAI-compatible API)
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # Anthropic
  # ---------------------------------------------------------------------------
  claude-sonnet:
    provider: anthropic
    model_id: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    tier: standard
    # temperature: 0.7                     # optional, defaults to 0.7

  claude-opus:
    provider: anthropic
    model_id: claude-opus-4-20250918
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    tier: advanced
    # temperature: 0.5                     # lower temperature recommended for reasoning tasks

  # ---------------------------------------------------------------------------
  # OpenAI
  # ---------------------------------------------------------------------------
  gpt-4o:
    provider: openai
    model_id: gpt-4o
    api_key_env: OPENAI_API_KEY
    max_tokens: 8192
    tier: standard
    # base_url_env: OPENAI_BASE_URL        # set OPENAI_BASE_URL in .env to use a proxy

  # ---------------------------------------------------------------------------
  # NVIDIA NIM (OpenAI-compatible API)
  # Covers inference endpoints for hundreds of open-source models including
  # Llama 3, Mixtral, Mistral, and more.
  # Get a key: https://build.nvidia.com  (free tier: 1,000 calls)
  #
  # Pattern A — indirect reference via env var name (original approach, always compatible):
  nvidia-glm:
    provider: openai
    model_id: z-ai/glm-5.1
    api_key_env: NVIDIA_API_KEY
    base_url_env: NVIDIA_BASE_URL        # e.g. https://integrate.api.nvidia.com/v1
    max_tokens: 16384
    temperature: 0.2
    tier: standard
  #
  # Pattern B — ${VAR} inline interpolation (new; recommended for third-party
  # endpoints; more explicit):
  # nvidia-llama:
  #   provider: openai
  #   model_id: meta/llama-3.3-70b-instruct
  #   api_key: ${NVIDIA_API_KEY}
  #   base_url: https://integrate.api.nvidia.com/v1   # or ${NVIDIA_BASE_URL}
  #   max_tokens: 4096
  #   temperature: 0.2
  #   tier: standard
  #
  # After enabling, add one entry to routes, e.g.:
  #   - match: { task: "reasoning" }
  #     model: nvidia-llama
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # DeepSeek (OpenAI-compatible API)
  # Generous free tier, well-suited for development and debugging.
  # Uncomment to enable.
  # Get a key: https://platform.deepseek.com
  # ---------------------------------------------------------------------------
  # deepseek-chat:
  #   provider: openai                     # uses the OpenAI-compatible endpoint
  #   model_id: deepseek-chat
  #   api_key_env: DEEPSEEK_API_KEY
  #   base_url_env: DEEPSEEK_BASE_URL      # https://api.deepseek.com/v1
  #   max_tokens: 8192
  #   temperature: 0.3                     # lower temperature recommended for DeepSeek reasoning
  #   tier: standard

  # deepseek-reasoner:
  #   provider: openai
  #   model_id: deepseek-reasoner
  #   api_key_env: DEEPSEEK_API_KEY
  #   base_url_env: DEEPSEEK_BASE_URL
  #   max_tokens: 8192
  #   temperature: 0.0                     # temperature 0 recommended for reasoning models
  #   tier: advanced

  # ---------------------------------------------------------------------------
  # Zhipu GLM (OpenAI-compatible API)
  # Domestic Chinese LLM with excellent Chinese-language capability.
  # Uncomment to enable.
  # Get a key: https://open.bigmodel.cn
  # ---------------------------------------------------------------------------
  glm-5:
     provider: openai
     model_id: glm-5
     api_key_env: ZHIPU_API_KEY
     base_url_env: ZHIPU_BASE_URL         # e.g. https://open.bigmodel.cn/api/paas/v4
     max_tokens: 8192
     temperature: 0.7
  #   tier: standard

  glm-5-turbo:
     provider: openai
     model_id: glm-5-turbo
     api_key_env: ZHIPU_API_KEY
     base_url_env: ZHIPU_BASE_URL         # e.g. https://open.bigmodel.cn/api/paas/v4
     max_tokens: 8192
     temperature: 0.7
  #   tier: standard

  glm-4.7:
     provider: openai
     model_id: glm-4.7                # free-tier model, fast
     api_key_env: ZHIPU_API_KEY
     base_url_env: ZHIPU_BASE_URL
     max_tokens: 8192
     temperature: 0.7
  #   tier: standard

  # ---------------------------------------------------------------------------
  # OpenRouter — unified gateway; one key unlocks 300+ models
  # (Anthropic / OpenAI / Google / Meta and more)
  # Get a key: https://openrouter.ai/settings/keys  (free tier available)
  # Model list: https://openrouter.ai/models
  # ---------------------------------------------------------------------------
  openrouter-claude-sonnet:
    provider: openai                                # OpenRouter is OpenAI-protocol compatible
    model_id: anthropic/claude-sonnet-4             # routed to Claude via OpenRouter
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    tier: standard

  openrouter-claude-opus:
    provider: openai
    model_id: anthropic/claude-opus-4
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.5
    tier: advanced

  openrouter-gpt-4o:
    provider: openai
    model_id: openai/gpt-4o
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    tier: standard

  openrouter-gemini-flash:
    provider: openai
    model_id: google/gemini-2.0-flash-001           # fast and cost-effective
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    tier: standard

  openrouter-gemini-pro:
    provider: openai
    model_id: google/gemini-pro-1.5
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.5
    tier: advanced

  openrouter-llama-3.3-70b:
    provider: openai
    model_id: meta-llama/llama-3.3-70b-instruct     # open-source flagship, strong coding ability
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    tier: standard

  openrouter-deepseek-v3:
    provider: openai
    model_id: deepseek/deepseek-chat-v3-0324         # DeepSeek V3, excellent for Chinese and code
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.3
    tier: standard

  openrouter-deepseek-r1:
    provider: openai
    model_id: deepseek/deepseek-r1                   # reasoning model, on par with o1
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.0
    tier: advanced

  openrouter-qwen-72b:
    provider: openai
    model_id: qwen/qwen-2.5-72b-instruct             # Qwen, top choice for Chinese language tasks
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    tier: standard

  openrouter-mistral-large:
    provider: openai
    model_id: mistralai/mistral-large-2411           # Mistral flagship model
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    tier: standard

routes:
  # ---------------------------------------------------------------------------
  # Smart routing: evaluated top-to-bottom; models without a configured API
  # key are automatically skipped.
  # Set any single key in .env and the router will use that model automatically.
  # ---------------------------------------------------------------------------
  - match: {}
    model: claude-sonnet           # first choice: Anthropic (requires ANTHROPIC_API_KEY)
  - match: {}
    model: gpt-4o                  # second choice: OpenAI (requires OPENAI_API_KEY)
  - match: {}
    model: nvidia-glm              # fallback: NVIDIA NIM GLM-5.1 (requires NVIDIA_API_KEY)
  - match: {}
    model: glm-5                   # fallback: Zhipu GLM-5 (requires ZHIPU_API_KEY)
  - match: {}
    model: glm-5-turbo             # fallback: Zhipu GLM-5-Turbo (requires ZHIPU_API_KEY)
  - match: {}
    model: glm-4.7                 # fallback: Zhipu GLM-4.7 free tier (requires ZHIPU_API_KEY)
  # --- OpenRouter (1 key → 300+ models) ----------------------------------------
  - match: {}
    model: openrouter-claude-sonnet  # OpenRouter → Claude Sonnet 4
  - match: {}
    model: openrouter-gpt-4o         # OpenRouter → GPT-4o
  - match: {}
    model: openrouter-gemini-flash   # OpenRouter → Gemini 2.0 Flash
  - match: {}
    model: openrouter-deepseek-v3    # OpenRouter → DeepSeek V3
  - match: {}
    model: openrouter-qwen-72b       # OpenRouter → Qwen 2.5 72B
  - match: {}
    model: openrouter-llama-3.3-70b  # OpenRouter → Llama 3.3 70B
  # ---------------------------------------------------------------------------
  # Kimi / Moonshot (OpenAI-compatible API)
  # Outstanding long-context capability (128k / 1M tokens). Uncomment to enable.
  # Get a key: https://platform.moonshot.cn
  # ---------------------------------------------------------------------------
  # moonshot-v1-8k:
  #   provider: openai
  #   model_id: moonshot-v1-8k
  #   api_key_env: MOONSHOT_API_KEY
  #   base_url_env: MOONSHOT_BASE_URL       # https://api.moonshot.cn/v1
  #   max_tokens: 8192
  #   temperature: 0.7
  #   tier: standard

  # moonshot-v1-128k:
  #   provider: openai
  #   model_id: moonshot-v1-128k            # 128k long-context window
  #   api_key_env: MOONSHOT_API_KEY
  #   base_url_env: MOONSHOT_BASE_URL
  #   max_tokens: 8192
  #   temperature: 0.5
  #   tier: advanced

  # ---------------------------------------------------------------------------
  # Local / self-hosted (Ollama, vLLM, LiteLLM, or any OpenAI-compatible endpoint)
  # ---------------------------------------------------------------------------
  # local-llama:
  #   provider: openai
  #   model_id: llama3                      # model name as registered in Ollama
  #   api_key_env: LOCAL_API_KEY            # Ollama requires no key by default; any non-empty value works
  #   base_url_env: LOCAL_BASE_URL          # http://localhost:11434/v1
  #   max_tokens: 8192
  #   temperature: 0.7
  #   tier: standard


# =============================================================================
# Execution parameters (Evaluator sandbox validation + retry circuit-breaker)
# =============================================================================

execution:
  max_retries: 3          # max Architect retries (includes Evaluator and QA failures)
  eval_timeout: 30        # Evaluator sandbox timeout in seconds
  token_budget: 100000    # global token budget
  token_threshold: 0.8    # circuit-breaker threshold when budget usage reaches 80%
  # preferred_model: ${AEGIS_DEFAULT_MODEL}   # uncomment to force a specific preferred model
  #   Example .env entry: AEGIS_DEFAULT_MODEL=claude-sonnet
  #   If left empty, the router selects the first model with an available key in routes order

# =============================================================================
# Route rules (evaluated top-to-bottom; first match wins; empty match is catch-all)
# =============================================================================
# After enabling a third-party model, update the routes below to change the
# default model. Example:
#   - match: {}
#     model: deepseek-chat
# =============================================================================

#routes:
#  - match: { customer: "enterprise", task: "reasoning" }
#    model: claude-opus
#  - match: { customer: "enterprise" }
#    model: claude-sonnet
#  - match: { task: "reasoning" }
#    model: gpt-4o
#  - match: {}                               # catch-all route
#    model: claude-sonnet

# =============================================================================
# Embedding model (knowledge-base semantic retrieval)
# =============================================================================
# Controls which embedding backend core_orchestrator/vector_store.py uses.
# Priority: EMBEDDING_* environment variables > this config file > auto-detection
#
# Supported providers:
#   openai  — uses the OpenAI Embeddings API (or any OpenAI-compatible endpoint)
#             requires the openai package; needs OPENAI_API_KEY or a custom api_key_env
#   ollama  — uses the Ollama local REST API, pure stdlib implementation,
#             works offline; default endpoint http://localhost:11434,
#             overridable via base_url
#
# Offline / air-gapped example (uncomment and adjust as needed):
# ---------------------------------------------------------------------------
#embedding:
#  provider: ollama
#  model: nomic-embed-text       # alternatives: mxbai-embed-large, all-minilm
#  base_url: http://localhost:11434
#
# Cloud OpenAI example:
# ---------------------------------------------------------------------------
#embedding:
#  provider: openai
#  model: text-embedding-3-small
#  api_key_env: OPENAI_API_KEY   # env var holding the API key
#  # base_url: https://...       # OpenAI-compatible endpoint (Azure, LM Studio, etc.)
#
# NVIDIA NIM mode (currently active — free tier: 1,000 calls):
# ---------------------------------------------------------------------------
embedding:
  provider: openai                              # NVIDIA NIM uses the OpenAI-compatible protocol
  model: nvidia/nv-embedqa-e5-v5               # 1024-dim model, optimised for semantic retrieval
  base_url: https://integrate.api.nvidia.com/v1
  api_key_env: NVIDIA_API_KEY                   # NVIDIA_API_KEY from .env

