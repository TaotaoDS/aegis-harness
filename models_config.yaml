# =============================================================================
# Model Configuration — AegisHarness
# =============================================================================
# 此文件定义所有可用模型及路由规则。
# API Key 绝不存储在此文件中，只引用 .env 中的环境变量名。
#
# 可选字段：
#   temperature   — 采样温度 (默认 0.7)
#   base_url_env  — 自定义 API 端点的环境变量名 (用于兼容 OpenAI 协议的第三方模型)
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # Anthropic
  # ---------------------------------------------------------------------------
  claude-sonnet:
    provider: anthropic
    model_id: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    tier: standard
    # temperature: 0.7                     # 可选，默认 0.7

  claude-opus:
    provider: anthropic
    model_id: claude-opus-4-20250918
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    tier: advanced
    # temperature: 0.5                     # 推理任务建议低温

  # ---------------------------------------------------------------------------
  # OpenAI
  # ---------------------------------------------------------------------------
  gpt-4o:
    provider: openai
    model_id: gpt-4o
    api_key_env: OPENAI_API_KEY
    max_tokens: 8192
    tier: standard
    # base_url_env: OPENAI_BASE_URL        # 如需代理，在 .env 中设置 OPENAI_BASE_URL

  # ---------------------------------------------------------------------------
  # NVIDIA NIM (OpenAI 兼容协议)
  # 覆盖 Llama 3、Mixtral、Mistral 等数百个开源模型的推理端点。
  # 申请 Key: https://build.nvidia.com  (免费额度 1000 次调用)
  #
  # 写法 A — 环境变量名间接引用 (原有方式，始终兼容):
  nvidia-glm:
    provider: openai
    model_id: z-ai/glm-5.1
    api_key_env: NVIDIA_API_KEY
    base_url_env: NVIDIA_BASE_URL        # https://integrate.api.nvidia.com/v1
    max_tokens: 16384
    temperature: 0.2
    tier: standard
  #
  # 写法 B — ${VAR} 内联插值 (新增，推荐用于第三方接口，更直观):
  # nvidia-llama:
  #   provider: openai
  #   model_id: meta/llama-3.3-70b-instruct
  #   api_key: ${NVIDIA_API_KEY}
  #   base_url: https://integrate.api.nvidia.com/v1   # 也可写 ${NVIDIA_BASE_URL}
  #   max_tokens: 4096
  #   temperature: 0.2
  #   tier: standard
  #
  # 启用后在 routes 中加一条即可，例如:
  #   - match: { task: "reasoning" }
  #     model: nvidia-llama
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # DeepSeek (OpenAI 兼容协议)
  # 免费额度充足，适合开发调试。取消注释即可启用。
  # 申请 Key: https://platform.deepseek.com
  # ---------------------------------------------------------------------------
  # deepseek-chat:
  #   provider: openai                     # 使用 OpenAI 兼容接口
  #   model_id: deepseek-chat
  #   api_key_env: DEEPSEEK_API_KEY
  #   base_url_env: DEEPSEEK_BASE_URL      # https://api.deepseek.com/v1
  #   max_tokens: 8192
  #   temperature: 0.3                     # DeepSeek 推理建议低温
  #   tier: standard

  # deepseek-reasoner:
  #   provider: openai
  #   model_id: deepseek-reasoner
  #   api_key_env: DEEPSEEK_API_KEY
  #   base_url_env: DEEPSEEK_BASE_URL
  #   max_tokens: 8192
  #   temperature: 0.0                     # 推理模型建议 0
  #   tier: advanced

  # ---------------------------------------------------------------------------
  # 智谱 GLM (OpenAI 兼容协议)
  # 国产大模型，中文能力优秀。取消注释即可启用。
  # 申请 Key: https://open.bigmodel.cn
  # ---------------------------------------------------------------------------
  glm-5:
     provider: openai
     model_id: glm-5
     api_key_env: ZHIPU_API_KEY
     base_url_env: ZHIPU_BASE_URL         # https://open.bigmodel.cn/api/paas/v4
     max_tokens: 8192
     temperature: 0.7
  #   tier: standard

  glm-5-turbo:
     provider: openai
     model_id: glm-5-turbo
     api_key_env: ZHIPU_API_KEY
     base_url_env: ZHIPU_BASE_URL         # https://open.bigmodel.cn/api/paas/v4
     max_tokens: 8192
     temperature: 0.7
  #   tier: standard

  glm-4.7:
     provider: openai
     model_id: glm-4.7                # 免费模型，速度快
     api_key_env: ZHIPU_API_KEY
     base_url_env: ZHIPU_BASE_URL
     max_tokens: 8192
     temperature: 0.7
  #   tier: standard
routes:
  # ---------------------------------------------------------------------------
  # 智能路由：从上到下依次匹配，自动跳过 API Key 未配置的模型
  # 只需在 .env 中设置任意一个 Key，路由器就会自动使用该模型
  # ---------------------------------------------------------------------------
  - match: {}
    model: claude-sonnet           # 首选：Anthropic（需 ANTHROPIC_API_KEY）
  - match: {}
    model: gpt-4o                  # 次选：OpenAI（需 OPENAI_API_KEY）
  - match: {}
    model: nvidia-glm              # 备用：NVIDIA NIM GLM-5.1（需 NVIDIA_API_KEY）
  - match: {}
    model: glm-5                   # 备用：智谱 GLM-5（需 ZHIPU_API_KEY）
  - match: {}
    model: glm-5-turbo             # 备用：智谱 GLM-5-Turbo（需 ZHIPU_API_KEY）
  - match: {}
    model: glm-4.7                 # 备用：智谱 GLM-4.7 免费版（需 ZHIPU_API_KEY）
  # ---------------------------------------------------------------------------
  # Kimi / Moonshot (OpenAI 兼容协议)
  # 长上下文能力突出 (128k/1M)。取消注释即可启用。
  # 申请 Key: https://platform.moonshot.cn
  # ---------------------------------------------------------------------------
  # moonshot-v1-8k:
  #   provider: openai
  #   model_id: moonshot-v1-8k
  #   api_key_env: MOONSHOT_API_KEY
  #   base_url_env: MOONSHOT_BASE_URL       # https://api.moonshot.cn/v1
  #   max_tokens: 8192
  #   temperature: 0.7
  #   tier: standard

  # moonshot-v1-128k:
  #   provider: openai
  #   model_id: moonshot-v1-128k            # 128k 长上下文
  #   api_key_env: MOONSHOT_API_KEY
  #   base_url_env: MOONSHOT_BASE_URL
  #   max_tokens: 8192
  #   temperature: 0.5
  #   tier: advanced

  # ---------------------------------------------------------------------------
  # 本地 / 自部署 (Ollama, vLLM, LiteLLM 等 OpenAI 兼容端点)
  # ---------------------------------------------------------------------------
  # local-llama:
  #   provider: openai
  #   model_id: llama3                      # Ollama 中的模型名
  #   api_key_env: LOCAL_API_KEY            # Ollama 默认不需要 Key，填任意值即可
  #   base_url_env: LOCAL_BASE_URL          # http://localhost:11434/v1
  #   max_tokens: 8192
  #   temperature: 0.7
  #   tier: standard


# =============================================================================
# 执行参数 (Evaluator 沙盒验证 + 重试熔断)
# =============================================================================

execution:
  max_retries: 3          # Architect 最大重试次数 (包含 Evaluator 和 QA 失败)
  eval_timeout: 30        # Evaluator 沙盒超时秒数
  token_budget: 100000    # 全局 token 预算
  token_threshold: 0.8    # 预算使用率熔断阈值 (80%)
  # preferred_model: ${AEGIS_DEFAULT_MODEL}   # 取消注释可强制指定首选模型
  #   示例 .env 配置: AEGIS_DEFAULT_MODEL=claude-sonnet
  #   留空则按 routes 顺序自动选择第一个有可用 Key 的模型

# =============================================================================
# 路由规则 (从上到下匹配，第一条命中即返回；空 match 为兜底)
# =============================================================================
# 启用第三方模型后，修改下方路由即可切换默认模型。例如：
#   - match: {}
#     model: deepseek-chat
# =============================================================================

#routes:
#  - match: { customer: "enterprise", task: "reasoning" }
#    model: claude-opus
#  - match: { customer: "enterprise" }
#    model: claude-sonnet
#  - match: { task: "reasoning" }
#    model: gpt-4o
#  - match: {}                               # 兜底路由
#    model: claude-sonnet

# =============================================================================
# Embedding model (知识库语义检索)
# =============================================================================
# 控制 core_orchestrator/vector_store.py 使用的 embedding 后端。
# 优先级：EMBEDDING_* 环境变量 > 此配置文件 > 自动检测
#
# provider 可选值:
#   openai  — 使用 OpenAI Embeddings API (或任何 OpenAI 兼容端点)
#             需要安装 openai 包；需要 OPENAI_API_KEY 或自定义 api_key_env
#   ollama  — 使用 Ollama 本地 REST API，纯 stdlib 实现，断网可用
#             默认端点 http://localhost:11434，可通过 base_url 修改
#
# 离线 / 断网模式示例 (取消下面注释并按需调整):
# ---------------------------------------------------------------------------
#embedding:
#  provider: ollama
#  model: nomic-embed-text       # 其他可选: mxbai-embed-large, all-minilm
#  base_url: http://localhost:11434
#
# 云端 OpenAI 模式示例:
# ---------------------------------------------------------------------------
#embedding:
#  provider: openai
#  model: text-embedding-3-small
#  api_key_env: OPENAI_API_KEY   # 存放 API Key 的环境变量名
#  # base_url: https://...       # OpenAI 兼容端点 (Azure/LM Studio 等)

